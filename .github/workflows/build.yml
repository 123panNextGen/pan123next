name: Build and Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如: 1.0.0)'
        required: false
        default: '1.0.0'
      preview:
        description: '是否为预览版本'
        required: false
        type: boolean
        default: false
      release_title:
        description: 'Release 标题'
        required: false
        default: '新版本发布'
      release_body:
        description: 'Release 描述内容'
        required: false
        default: '本次更新包含以下内容：\n\n- 修复已知问题\n- 性能优化'
      auto_generate:
        description: '是否自动生成更新内容 (基于 git log)'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  packages: read

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        include:
          - os: ubuntu-latest
            target: linux
            artifact: build/linux/x64/release/bundle/
            artifact_name: pan123next-linux
          - os: windows-latest
            target: windows
            artifact: build/windows/x64/runner/Release/
            artifact_name: pan123next-windows
          - os: macos-latest
            target: macos
            artifact: build/macos/Build/Products/Release/
            artifact_name: pan123next-macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libnotify-dev \
          libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
          ninja-build

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        if: matrix.target == 'linux'
        run: flutter build linux --release

      - name: Build Windows
        if: matrix.target == 'windows'
        run: flutter build windows --release

      - name: Build macOS
        if: matrix.target == 'macos'
        run: flutter build macos --release

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact }}

  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: pan123next-apk
          path: build/app/outputs/apk/release/app-release.apk

  release:
    name: Create GitHub Release
    needs: [ build, build-apk ]
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          python-version-file: ".python-version"
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip zip
          uv sync

      - name: Download all artifacts
        uses: actions/download-artifact@v6

      - name: Set version for manual trigger
        if: github.event_name == 'workflow_dispatch'
        run: echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV

      - name: Set version for push trigger
        if: github.event_name == 'push'
        run: echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Prepare release notes
        id: notes
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # 手动触发
            VERSION="${{ github.event.inputs.version }}"
            IS_PREVIEW="${{ github.event.inputs.preview }}"
            RELEASE_TITLE="${{ github.event.inputs.release_title }}"
            RELEASE_BODY="${{ github.event.inputs.release_body }}"
            AUTO_GENERATE="${{ github.event.inputs.auto_generate }}"
          else
            # Tag 推送触发
            VERSION="${GITHUB_REF_NAME#v}"
            IS_PREVIEW="false"
            RELEASE_TITLE="Pan123Next Release $VERSION"
            RELEASE_BODY=""
            AUTO_GENERATE="true"
          fi

          # 调用格式化脚本
          if [ "$AUTO_GENERATE" == "true" ]; then
            # 自动生成更新内容
            uv run script/formatRelease.py \
              --file=doc/ReleaseTemplate.md \
              --version="$VERSION" \
              $( [ "$IS_PREVIEW" == "true" ] && echo "--pre" || echo "--no-pre" ) > /tmp/release_body.md
          else
            # 使用用户输入的内容
            uv run script/formatRelease.py \
              --file=doc/ReleaseTemplate.md \
              --version="$VERSION" \
              $( [ "$IS_PREVIEW" == "true" ] && echo "--pre" || echo "--no-pre" ) \
              --message="$RELEASE_BODY" > /tmp/release_body.md
          fi

          # 设置输出变量
          echo "title=${RELEASE_TITLE}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "prerelease=${IS_PREVIEW:-false}" >> $GITHUB_OUTPUT
          echo "body_file=/tmp/release_body.md" >> $GITHUB_OUTPUT

      - name: Unzip artifacts
        run: |
          mkdir artifacts
          cp pan123next-apk/app-release.apk artifacts/Pan123Next-Android.apk
          zip -r artifacts/Pan123Next-Linux.zip pan123next-linux/
          zip -r artifacts/Pan123Next-Windows.zip pan123next-windows/
          zip -r artifacts/Pan123Next-macos.zip pan123next-macos/
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: ${{ steps.notes.outputs.title }}
          body_path: ${{ steps.notes.outputs.body_file }}
          files: |
            ./artifacts/*
          prerelease: ${{ steps.notes.outputs.prerelease == 'true' }}
          generate_release_notes: false
          token: ${{ secrets.CUSTOM_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
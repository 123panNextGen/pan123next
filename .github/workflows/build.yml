name: Build and Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如: 1.0.0)'
        required: false
        default: '1.0.0'
      preview:
        description: '是否为预览版本'
        required: false
        type: boolean
        default: false
      release_title:
        description: 'Release 标题'
        required: false
        default: '新版本发布'
      release_body:
        description: 'Release 描述内容'
        required: false
        default: '本次更新包含以下内容：\n\n- 修复已知问题\n- 性能优化'

permissions:
  contents: write
  packages: read

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            target: linux
            artifact: build/linux/x64/release/bundle/
            artifact_name: pan123next-linux
          - os: windows-latest
            target: windows
            artifact: build/windows/x64/runner/Release/
            artifact_name: pan123next-windows
          - os: macos-latest
            target: macos
            artifact: build/macos/Build/Products/Release/
            artifact_name: pan123next-macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      
      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libnotify-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            ninja-build

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        if: matrix.target == 'linux'
        run: flutter build linux --release

      - name: Build Windows
        if: matrix.target == 'windows'
        run: flutter build windows --release

      - name: Build macOS
        if: matrix.target == 'macos'
        run: flutter build macos --release

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact }}

  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: pan123next-apk
          path: build/app/outputs/apk/release/app-release.apk

  release:
    name: Create Release
    needs: [build, build-apk]
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          python-version-file: ".python-version"

      - name: Install dependencies
        working-directory: src
        run: |
          uv sync --locked --all-extras --all-groups --dev

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Prepare release notes
        id: notes
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          INPUTS_VERSION: ${{ github.event.inputs.version }}
          INPUTS_PREVIEW: ${{ github.event.inputs.preview }}
          INPUTS_RELEASE_TITLE: ${{ github.event.inputs.release_title }}
          INPUTS_RELEASE_BODY: ${{ github.event.inputs.release_body }}
        run: |
          # 创建临时模板文件
          cat > /tmp/release_template.md << 'TEMPLATE_EOF'
          # Pan123 Next Release ${{ Version }}

          ${{ isPreVersion : start }}
          > [!WARNING]
          > 该版本仍处于预览版本
          ${{ end }}

          ## 更新说明

          ${{ UpdateMessage }}
          TEMPLATE_EOF

          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # 手动触发：使用用户输入的内容
            VERSION="${{ github.event.inputs.version }}"
            IS_PREVIEW="${{ github.event.inputs.preview }}"
            RELEASE_TITLE="Pan123Next ${{ github.event.inputs.release_title }}"
            RELEASE_BODY="${{ github.event.inputs.release_body }}"
            
            if [ "$IS_PREVIEW" == "true" ]; then
              PREVIEW_ARG="--pre"
            else
              PREVIEW_ARG="--no-pre"
            fi
            
            # 调用格式化脚本
            FORMATTED_BODY=$(python .github/scripts/md_formatter.py \
              --file=/tmp/release_template.md \
              --version="$VERSION" \
              $PREVIEW_ARG \
              --message="$RELEASE_BODY")
          else
            # Tag 推送触发：使用 tag 信息
            VERSION="${{ github.ref_name }}"
            IS_PREVIEW="false"
            RELEASE_TITLE="Pan123Next Release $VERSION"
            RELEASE_BODY="自动构建发布\n\n**版本**: $VERSION\n\n**提交**: ${{ github.sha }}\n\n**更新内容**:\n- 自动构建版本"
            
            # 调用格式化脚本
            FORMATTED_BODY=$(python ./script/formatRelease.py \
              --file=/tmp/release_template.md \
              --version="$VERSION" \
              --no-pre \
              --message="$RELEASE_BODY")
          fi
          
          # 设置输出变量
          echo "title=${RELEASE_TITLE}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "prerelease=${IS_PREVIEW:-false}" >> $GITHUB_OUTPUT
          
          # 将格式化的内容写入文件，避免特殊字符问题
          echo "$FORMATTED_BODY" > /tmp/release_body.md
          echo "body_file=/tmp/release_body.md" >> $GITHUB_OUTPUT

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.notes.outputs.tag }}
          name: ${{ steps.notes.outputs.title }}
          bodyFile: ${{ steps.notes.outputs.body_file }}
          prerelease: ${{ steps.notes.outputs.prerelease == 'true' }}
          artifacts: |
            pan123next-linux/**
            pan123next-windows/**
            pan123next-macos/**
            pan123next-apk/*.apk
          token: ${{ secrets.GITHUB_TOKEN }}